<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Contact Messages</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0b0728; color: #e8f4fd; margin: 0; padding: 24px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .meta { color: #00f5ff; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; background: rgba(13,27,75,0.5); border: 1px solid rgba(0,245,255,0.2); border-radius: 12px; overflow: hidden; }
    th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(0,245,255,0.12); vertical-align: top; }
    th { background: rgba(0,245,255,0.08); color: #00f5ff; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(0,245,255,0.04); }
    .msg { max-width: 420px; white-space: pre-wrap; word-break: break-word; }
    a { color: #c724ff; }
  </style>
</head>
<body>
  <h1>Contact messages</h1>
  <p class="meta">Visitor count: <strong>{{ visitors }}</strong></p>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody>
      {% for c in contacts %}
      <tr>
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td class="msg">{{ c.message }}</td>
        <td>{{ c.created_at }}</td>
      </tr>
      {% else %}
      <tr><td colspan="4">No messages yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
  <p style="margin-top:24px"><a href="/">← Back to portfolio</a></p>
</body>
</html>
